name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'
      - name: Install
        run: npm ci
      # For the jj integration tests in server/diff.test.ts (git is
      # preinstalled). jj publishes no checksums or attestations, so pin the
      # tarball's sha256 here for integrity — release assets are mutable.
      - name: Install jj
        run: |
          curl --silent --fail --location --output /tmp/jj.tar.gz \
            https://github.com/jj-vcs/jj/releases/download/v0.43.0/jj-v0.43.0-x86_64-unknown-linux-musl.tar.gz
          echo '59e5588583ac82b623239929368c65b90735931c0f26b5a16c1f04d5bb97643d  /tmp/jj.tar.gz' | sha256sum --check
          mkdir --parents "$HOME/.local/bin"
          tar --extract --gzip --file /tmp/jj.tar.gz --directory "$HOME/.local/bin" ./jj
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/jj" --version
      - name: Typecheck
        run: npm run tsc
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run fmt:check
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      # Nothing else executes the tsdown bundle, so catch broken output here
      - name: Smoke-test bundle
        run: node dist/cli.js --help
