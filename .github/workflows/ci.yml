name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  ci:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Install jj
        uses: ./.github/actions/install-jj
      - name: Typecheck
        run: npm run tsc
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run fmt:check
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      # Nothing else executes the tsdown bundle, so catch broken output here
      - name: Smoke-test bundle
        run: node dist/cli.js --help
